# ================================================================
# gitleaks 設定ファイル
# 目的: チーム標準の gitleaks 設定を明示的に管理する
# 将来、誤検知が発生した際の Allowlist もここで管理予定
# ================================================================

# デフォルトルールを継承
[extend]
useDefault = true

# .env.example は既知のダミー値のみ含むため誤検知対象外とする
[allowlist]
description = ".env.example の既知ダミー値を誤検知対象外にする"
paths = ['''\.env\.example''']
