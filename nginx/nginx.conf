# ==============================================================
# Nginx 設定 (ローカル本番相当・同一オリジン構成)
# --------------------------------------------------------------
# ポイント:
#  - /api/ → backend(Express), それ以外 → frontend(Vite)
#  - Vite HMR 用 WebSocket を通す設定
#  - SSE(OpenAI streaming) を想定して proxy_buffering off
# ==============================================================

events {
  worker_connections 1024;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;
  client_max_body_size 10M;

  upstream frontend {
    server frontend:3000;
  }

  upstream backend {
    server backend:8000;
  }

  server {
    listen 80;
    server_name localhost;

    # ---------- API プロキシ ----------
    location /api/ {
      proxy_pass http://backend;
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;

      # SSE / ストリーミングレスポンス用(OpenAI streaming対応)
      proxy_buffering off;
      proxy_cache off;
      proxy_read_timeout 300s;
      proxy_send_timeout 300s;
    }

    # ---------- フロントエンド(Vite dev server) ----------
    location / {
      proxy_pass http://frontend;
      proxy_http_version 1.1;

      # Vite HMR の WebSocket を通すための必須ヘッダ
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 86400s;
    }
  }
}
