# ==============================================================
# .github/workflows/ci.yml
# 対象ブランチ: feature/* → main へのPR、main へのpush
# 担当: S0-C-03 (メンバーC担当タスク / リーダーA代行)
#
# ── ジョブ構成 ────────────────────────────────────────────────
#  backend       : lint / tsc / jest (ユニット、DB不要)
#  frontend      : lint / Vite build (tsc込み)
#  migrate-check : Prisma migrate dry-run (postgres サービス使用)
#
# ── 今後の追加予定 ────────────────────────────────────────────
#  Sprint 4以降: e2e ジョブ (Playwright) を追加予定
#    - needs: [backend, frontend, migrate-check]
#    - docker compose up で全サービス起動してブラウザテスト
#
# ── 外部APIキーについて ────────────────────────────────────────
#  テスト環境ではモック推奨。実キーが必要なintegrationテストは
#  GitHub Actions の Secrets に登録してから利用すること。
#  → Settings > Secrets and variables > Actions > New repository secret
# ==============================================================

name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  # ─────────────────────────────────────────────
  # Job 1: バックエンド lint / typecheck / test
  # ─────────────────────────────────────────────
  backend:
    name: Backend — lint / build / test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint
        env:
          ESLINT_USE_FLAT_CONFIG: "false"

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Test (unit / no DB)
        run: npm test -- --passWithNoTests
        env:
          # ────────────────────────────────────────────────────
          # DB: ユニットテストはDBに繋がないためダミー値でOK
          DATABASE_URL: postgresql://postgres:password@localhost:5432/selfcare_test
          NODE_ENV: test

          # JWT: 実装側でバリデーションを入れる場合は
          #      32文字以上の文字列が必要なのでこの値を維持すること
          JWT_SECRET: ci-test-secret-at-least-32-characters-long

          # ────────────────────────────────────────────────────
          # 外部APIキー: ユニットテストはすべてモックで対応する。
          # モック未対応のテストが増えた場合は
          # GitHub Secrets に実キーを登録して ${{ secrets.OPENAI_API_KEY }}
          # のように参照すること（このファイルに実キーを直書きしないこと）
          OPENAI_API_KEY: sk-dummy-key-for-unit-tests
          GOOGLE_MAPS_API_KEY: dummy-maps-key-for-unit-tests
          SEARCH_API_KEY: dummy-search-key-for-unit-tests

          # ────────────────────────────────────────────────────
          # ⚠️ integration テスト (外部API実呼び出し) を追加する場合:
          #    1. GitHub リポジトリの Settings > Secrets に実キーを登録
          #    2. 以下のように参照する（コメントアウトを外す）
          #
          # OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          # SEARCH_API_KEY: ${{ secrets.SEARCH_API_KEY }}

  # ─────────────────────────────────────────────
  # Job 2: フロントエンド lint / build
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend — lint / build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (includes tsc type check)
        run: npm run build
        env:
          # ────────────────────────────────────────────────────
          # Vite はビルド時に VITE_* 環境変数をバンドルする。
          # 未定義の場合 undefined になりビルドは通るが実行時エラーになる。
          # CI ではダミー値を設定してビルドエラーを防ぐ。
          #
          # 本番・本番相当環境では GitHub Secrets を利用すること:
          #   VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_API_BASE_URL: http://localhost:8000
          VITE_GOOGLE_MAPS_API_KEY: dummy-maps-key-for-build

  # ─────────────────────────────────────────────
  # Job 3: Prisma migrate dry-run
  # main へのPRでマイグレーション整合性を確認する。
  # DB が必要なため postgres サービスコンテナを利用。
  #
  # ▶ migrate deploy を使う理由:
  #   - コミット済みマイグレーションファイルの適用可否を検証する
  #   - スキーマ変更時にマイグレーションファイルのコミット漏れを検知できる
  #   ※ マイグレーションファイルを作らずスキーマだけ変更した場合は
  #     このジョブが失敗するため、チームへの周知が必要
  # ─────────────────────────────────────────────
  migrate-check:
    name: Prisma — migrate dry-run
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: selfcare_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/selfcare_test

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/selfcare_test

  # ─────────────────────────────────────────────
  # Job 4 (Sprint 4以降): E2E テスト — Playwright
  # ─────────────────────────────────────────────
  # 以下は Sprint 4 で有効化する。
  # それまでは if: false でスキップ（ジョブ定義を残しておく）。
