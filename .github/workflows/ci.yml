# ==============================================================
# .github/workflows/ci.yml
# 対象ブランチ: develop / main へのPR
# 担当: S0-C-03 (メンバーC担当タスク / リーダーA代行)
# 備考:
#   - monorepo構成ではないため backend / frontend を個別に実行
#   - typecheck は build コマンドに tsc が含まれるため build で代替
#   - jest はDBなしで動作するユニットテストのみを想定
#   - migrate は別ジョブ (migrate-check) で担保
# ==============================================================

name: CI

on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop

jobs:
  # ─────────────────────────────────────────────
  # Job 1: バックエンド lint / typecheck / test
  # ─────────────────────────────────────────────
  backend:
    name: Backend — lint / build / test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check (tsc)
        run: npx tsc --noEmit

      - name: Test (unit / no DB)
        run: npm test -- --passWithNoTests
        env:
          # ユニットテストはDBに繋がないためダミー値でOK
          DATABASE_URL: postgresql://postgres:password@localhost:5432/selfcare_test
          JWT_SECRET: ci-test-secret-at-least-32-characters-long
          NODE_ENV: test

  # ─────────────────────────────────────────────
  # Job 2: フロントエンド lint / build
  # ─────────────────────────────────────────────
  frontend:
    name: Frontend — lint / build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build (includes tsc type check)
        run: npm run build

  # ─────────────────────────────────────────────
  # Job 3: Prisma migrate dry-run (S1-C-04 先行)
  # DB が必要なため postgres サービスコンテナを利用
  # ─────────────────────────────────────────────
  migrate-check:
    name: Prisma — migrate dry-run
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: selfcare_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/selfcare_test

      - name: Run migrations
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/selfcare_test
