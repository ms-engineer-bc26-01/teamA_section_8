# ================================================================
# pre-commit 設定ファイル
# 目的: コミット時にシークレット(APIキー等)の漏洩を自動検出
# マニュアル7章「セキュリティ(Cの重責)」pre-commit hook に対応
# ================================================================

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        name: Detect hardcoded secrets
        description: Detect hardcoded secrets using gitleaks
        stages: [pre-commit]      
